server:
  port: 8090

spring:
  datasource:
    # H2 in MySQL-compat mode — swap url/driver/username/password for MySQL later
    url: jdbc:h2:mem:marketdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always          # runs schema.sql on startup
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.market.monitor.model
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
    log-impl: org.apache.ibatis.logging.log4j2.Log4j2Impl

app:
  alpha-vantage:
    api-key: ${ALPHA_VANTAGE_API_KEY:demo}
  coin-gecko:
    api-key: ${COIN_GECKO_API_KEY:}
  scheduler:
    crypto-interval-ms: 60000    # 1 minute
    stock-interval-ms: 15000     # 15 seconds (Alpha Vantage free: 5 req/min)
  cache:
    price-ttl-minutes: 2

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  config: classpath:log4j2.xml